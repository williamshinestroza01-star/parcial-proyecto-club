<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Club</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1d2433;
            --accent: #1769aa;
            --border: #d8e0ec;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            background: linear-gradient(160deg, #eef3f9 0%, #f8fbff 100%);
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
        }

        h1, h2 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.25rem;
            border-radius: 8px;
            border: 1px solid #c7d2e2;
            box-sizing: border-box;
        }

        button {
            margin-top: 0.8rem;
            background: var(--accent);
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            cursor: pointer;
        }

        ul {
            padding-left: 0;
            list-style: none;
        }

        li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f4f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .btn-edit {
            background-color: #e28743;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0;
        }

        .btn-delete {
            background-color: #d32f2f;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0;
        }

        .links {
            margin: 1rem 0;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Proyecto Club</h1>
    <p>Gestion basica de usuarios y clubes.</p>

    <div class="links">
        <a href="/swagger-ui.html" target="_blank">Swagger UI</a>
        <a href="/api-docs" target="_blank">OpenAPI JSON</a>
        <a href="/h2-console" target="_blank">H2 Console (dev)</a>
    </div>

    <div class="grid">
        <section class="card">
            <h2>Registrar usuario</h2>
            <form method="post" action="/usuarios">
                <label>Nombre
                    <input type="text" name="nombre" required>
                </label>
                <label>Email
                    <input type="email" name="email">
                </label>
                <label>Usuario
                    <input type="text" name="username" required>
                </label>
                <label>Contrasena
                    <input type="password" name="password" required>
                </label>
                <label>Rol
                    <input type="text" name="rol" placeholder="admin, socio, etc." required>
                </label>
                <button type="submit">Guardar usuario</button>
            </form>
        </section>

        <section class="card">
            <h2>Crear club</h2>
            <form method="post" action="/clubes">
                <label>Nombre del club
                    <input type="text" name="nombre" required>
                </label>
                <button type="submit">Guardar club</button>
            </form>
        </section>

        <section class="card">
            <h2>Usuarios</h2>
            <ul>
                <li th:if="${#lists.isEmpty(usuarios)}">Sin usuarios registrados.</li>
                <li th:each="usuario : ${usuarios}">
                    <div>
                        <strong th:text="${usuario.username}">usuario</strong>
                        <span> - Rol: </span><span th:text="${usuario.rol}">rol</span>
                    </div>
                    <div class="actions">
                        <button class="btn-edit js-edit-usuario"
                                th:data-id="${usuario.id}"
                                th:data-nombre="${usuario.nombre}"
                                th:data-email="${usuario.email}"
                                th:data-username="${usuario.username}"
                                th:data-rol="${usuario.rol}"
                                type="button">Editar</button>
                        <button class="btn-delete js-delete-usuario"
                                th:data-id="${usuario.id}"
                                type="button">X</button>
                    </div>
                </li>
            </ul>
        </section>

        <section class="card">
            <h2>Clubes</h2>
            <ul>
                <li th:if="${#lists.isEmpty(clubes)}">Sin clubes registrados.</li>
                <li th:each="club : ${clubes}">
                    <span th:text="${club.nombre}">Club</span>
                    <div class="actions">
                        <button class="btn-edit js-edit-club"
                                th:data-id="${club.id}"
                                th:data-nombre="${club.nombre}"
                                type="button">Editar</button>
                        <button class="btn-delete js-delete-club"
                                th:data-id="${club.id}"
                                type="button">X</button>
                    </div>
                </li>
            </ul>
        </section>
    </div>
</div>

<script>
    const API_BASE = `${window.location.origin}/api`;

    document.querySelectorAll(".js-delete-club").forEach((button) => {
        button.addEventListener("click", () => eliminarClub(button.dataset.id));
    });

    document.querySelectorAll(".js-edit-club").forEach((button) => {
        button.addEventListener("click", () => editarClub(button.dataset.id, button.dataset.nombre));
    });

    document.querySelectorAll(".js-delete-usuario").forEach((button) => {
        button.addEventListener("click", () => eliminarUsuario(button.dataset.id));
    });

    document.querySelectorAll(".js-edit-usuario").forEach((button) => {
        button.addEventListener("click", () => editarUsuario(button.dataset));
    });

    async function eliminarClub(id) {
        if (!confirm("Seguro que quieres eliminar este club?")) {
            return;
        }

        const res = await fetch(`${API_BASE}/clubes/eliminar/${id}`, {method: "DELETE"});
        if (res.ok) {
            location.reload();
            return;
        }
        alert("Error al eliminar el club");
    }

    async function editarClub(id, nombreActual) {
        const nuevoNombre = prompt("Modificar nombre del club:", nombreActual || "");
        if (!nuevoNombre || nuevoNombre.trim() === "") {
            return;
        }

        const res = await fetch(`${API_BASE}/clubes/actualizar/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({nombre: nuevoNombre.trim()})
        });

        if (res.ok) {
            location.reload();
            return;
        }
        alert("Error al actualizar el club");
    }

    async function eliminarUsuario(id) {
        if (!confirm("Seguro que quieres eliminar este usuario?")) {
            return;
        }

        const res = await fetch(`${API_BASE}/usuarios/eliminar/${id}`, {method: "DELETE"});
        if (res.ok) {
            location.reload();
            return;
        }
        alert("Error al eliminar el usuario");
    }

    async function editarUsuario(usuario) {
        const nombre = prompt("Modificar nombre:", usuario.nombre || "");
        const email = prompt("Modificar email:", usuario.email || "");
        const username = prompt("Modificar nombre de usuario:", usuario.username || "");
        const rol = prompt("Modificar rol:", usuario.rol || "");

        if (!nombre || !username || !rol) {
            return;
        }

        const res = await fetch(`${API_BASE}/usuarios/actualizar/${usuario.id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                nombre: nombre.trim(),
                email: email ? email.trim() : "",
                username: username.trim(),
                rol: rol.trim()
            })
        });

        if (res.ok) {
            location.reload();
            return;
        }
        alert("Error al actualizar el usuario");
    }
</script>
</body>
</html>
