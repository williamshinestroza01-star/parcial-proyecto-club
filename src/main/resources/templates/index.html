<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Club</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1d2433;
            --accent: #1769aa;
            --border: #d8e0ec;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            background: linear-gradient(160deg, #eef3f9 0%, #f8fbff 100%);
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
        }

        h1, h2 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.25rem;
            border-radius: 8px;
            border: 1px solid #c7d2e2;
            box-sizing: border-box;
        }

        button {
            margin-top: 0.8rem;
            background: var(--accent);
            color: #fff;
            border: 0;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            cursor: pointer;
        }

        ul {
            padding-left: 0;
            list-style: none;
        }

        li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f4f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .btn-edit {
            background-color: #e28743;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0;
        }

        .btn-delete {
            background-color: #d32f2f;
            padding: 0.3rem 0.6rem;
            font-size: 0.8rem;
            margin-top: 0;
        }

        .links {
            margin-top: 1rem;
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            margin-right: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Proyecto Club</h1>
    <p>Gestión básica de usuarios y clubes.</p>

    <div class="links">
        <a href="/swagger-ui.html" target="_blank">Swagger UI</a>
        <a href="/api-docs" target="_blank">OpenAPI JSON</a>
        <a href="/h2-console" target="_blank">H2 Console (dev)</a>
    </div>

    <div class="grid">
        <section class="card">
            <h2>Registrar usuario</h2>
            <form method="post" action="/usuarios">
                <label>Usuario
                    <input type="text" name="username" required>
                </label>
                <label>Contraseña
                    <input type="password" name="password" required>
                </label>
                <label>Rol
                    <input type="text" name="rol" placeholder="admin, socio, etc." required>
                </label>
                <button type="submit">Guardar usuario</button>
            </form>
        </section>

        <section class="card">
            <h2>Crear club</h2>
            <form method="post" action="/clubes">
                <label>Nombre del club
                    <input type="text" name="nombre" required>
                </label>
                <button type="submit">Guardar club</button>
            </form>
        </section>

        <section class="card">
            <h2>Usuarios</h2>
            <ul>
                <li th:if="${#lists.isEmpty(usuarios)}">Sin usuarios registrados.</li>
                <li th:each="usuario : ${usuarios}">
                    <div>
                        <strong th:text="${usuario.username}">usuario</strong>
                        <span> - Rol: </span><span th:text="${usuario.rol}">rol</span>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" th:onclick="'editarUsuario(' + ${usuario.id} + ', \'' + ${usuario.username} + '\', \'' + ${usuario.rol} + '\')'">Editar</button>
                        <button class="btn-delete" th:onclick="'eliminarUsuario(' + ${usuario.id} + ')'">X</button>
                    </div>
                </li>
            </ul>
        </section>

        <section class="card">
            <h2>Clubes</h2>
            <ul>
                <li th:if="${#lists.isEmpty(clubes)}">Sin clubes registrados.</li>
                <li th:each="club : ${clubes}">
                    <span th:text="${club.nombre}">Club</span>
                    <div class="actions">
                        <button class="btn-edit" th:onclick="'editarClub(' + ${club.id} + ', \'' + ${club.nombre} + '\')'">Editar</button>
                        <button class="btn-delete" th:onclick="'eliminarClub(' + ${club.id} + ')'">X</button>
                    </div>
                </li>
            </ul>
        </section>
    </div>
</div>

<script>
    // URL base de tu backend desplegado en Railway
    const API_BASE = "https://parcial-proyecto-club-production-6698.up.railway.app/api";

    // --- ACCIONES PARA CLUBES ---
    async function eliminarClub(id) {
        if (confirm("¿De verdad querés eliminar este club?")) {
            const res = await fetch(`${API_BASE}/clubes/eliminar/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Club eliminado correctamente");
                location.reload();
            } else {
                alert("Error al eliminar el club");
            }
        }
    }

    async function editarClub(id, nombreActual) {
        const nuevoNombre = prompt("Modificar nombre del club:", nombreActual);
        if (nuevoNombre && nuevoNombre.trim() !== "") {
            const res = await fetch(`${API_BASE}/clubes/actualizar/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre: nuevoNombre })
            });
            if (res.ok) {
                alert("Club actualizado");
                location.reload();
            }
        }
    }

    // --- ACCIONES PARA USUARIOS ---
    async function eliminarUsuario(id) {
        if (confirm("¿Seguro que querés eliminar este usuario?")) {
            const res = await fetch(`${API_BASE}/usuarios/eliminar/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert("Usuario eliminado correctamente");
                location.reload();
            } else {
                alert("Error al eliminar el usuario");
            }
        }
    }

    async function editarUsuario(id, usernameActual, rolActual) {
        const nuevoUsername = prompt("Modificar nombre de usuario:", usernameActual);
        const nuevoRol = prompt("Modificar rol:", rolActual);

        if (nuevoUsername && nuevoRol) {
            const res = await fetch(`${API_BASE}/usuarios/actualizar/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: nuevoUsername,
                    nombre: nuevoUsername, // Tu controlador pide nombre, le mandamos el mismo
                    rol: nuevoRol,
                    password: "no_cambiada" // Le mandamos un valor por defecto para no romper el modelo
                })
            });
            if (res.ok) {
                alert("Usuario actualizado");
                location.reload();
            }
        }
    }
</script>
</body>
</html>
