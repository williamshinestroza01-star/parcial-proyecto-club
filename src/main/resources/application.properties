# Puerto dinámico para Railway
server.port=${PORT:8080}

# Conexión flexible: Si Railway detecta Postgres, lo usa. Si no, usa H2 (en tu PC).
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:db_club}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:org.h2.Driver}

# Hibernate: 'update' crea las tablas si no existen sin borrar los datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger y H2 Console
springdoc.swagger-ui.path=/swagger-ui.html
spring.h2.console.enabled=true